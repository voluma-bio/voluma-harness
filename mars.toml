[dependencies.meridian-dev-workflow]
url = "https://github.com/meridian-flow/meridian-dev-workflow"

[dependencies.meridian-prompter]
url = "https://github.com/haowjy/meridian-prompter"

[settings]
targets = [
    ".claude",
    ".codex",
    ".pi",
    ".cursor",
    ".opencode",
]
models_cache_ttl_hours = 24

[settings.meridian.agent_copy]
harnesses = ["claude"]
include_fanout = false

[settings.meridian.fanout]
agents = []
