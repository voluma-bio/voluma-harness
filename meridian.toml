# Meridian configuration — voluma-harness (v1 primary docs + code repo)
# Env vars (MERIDIAN_*) take precedence over file values.

[defaults]
# max_depth = 3
# harness = "codex"

[spawn]
deny_headless_harnesses = ["claude"]

[primary]
agent = "product-lead"

[output]
# show = ["lifecycle", "sub-run", "error", "system"]

[state]
# retention_days = 30

# -- Context ------------------------------------------------------------------
# voluma-harness is the PRIMARY docs home: work/ and kb/ live in-repo (source =
# "local"), versioned alongside the code. Only strategy is externalized to the
# shared voluma-bio/docs repo (business strategy stays private there).
[context.work]
source = "local"
path = "work"
archive = "archive/work"

[context.kb]
source = "local"
path = "kb"

[context.strategy]
source = "git"
remote = "git@github.com:voluma-bio/docs.git"
path = "strategy"

# -- Workspace roots ----------------------------------------------------------
[workspace.sibling-repos]
path = ".."
