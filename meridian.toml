# Meridian configuration — voluma-harness (v1 code repo)
# Env vars (MERIDIAN_*) take precedence over file values.

[defaults]
# max_depth = 3
# harness = "codex"

[spawn]
deny_headless_harnesses = ["claude"]

[primary]
agent = "product-lead"

[output]
# show = ["lifecycle", "sub-run", "error", "system"]

[state]
# retention_days = 30

# -- Context ------------------------------------------------------------------
# Docs live in the shared voluma-bio/docs repo (the "org brain") — the same repo
# the retired voluma v0 used. work/kb/strategy externalize there; nothing
# docs-wise lives in this code repo.
[context.work]
source = "git"
remote = "git@github.com:voluma-bio/docs.git"
path = "work"
archive = "archive/voluma-harness/work"

[context.kb]
source = "git"
remote = "git@github.com:voluma-bio/docs.git"
path = "kb"

[context.strategy]
source = "git"
remote = "git@github.com:voluma-bio/docs.git"
path = "strategy"

# -- Hooks --------------------------------------------------------------------
# Auto-sync work/kb/strategy back to the docs repo.
[[hooks]]
builtin = "git-autosync"
remote = "git@github.com:voluma-bio/docs.git"

# -- Workspace roots ----------------------------------------------------------
[workspace.sibling-repos]
path = ".."
